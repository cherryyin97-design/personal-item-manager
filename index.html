<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>个人物品管理</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <h1>个人物品管理</h1>
      <button id="add-item-btn" class="btn btn-primary">+ 新增物品</button>
    </header>

    <section class="search-wrap">
      <input id="global-search" type="search" placeholder="搜索名称/备注/标签..." autocomplete="off">
      <div id="search-results" class="search-results hidden"></div>
    </section>

    <main class="content">
      <section id="tab-home" class="tab-panel active">
        <div class="card quick-actions">
          <h3>快速录入</h3>
          <div class="setting-actions">
            <label class="btn btn-file">拍照录入<input id="camera-input" type="file" accept="image/*" capture="environment"></label>
            <button id="scan-barcode-btn" class="btn">扫码录入</button>
            <button id="batch-add-btn" class="btn">批量录入</button>
          </div>
          <div id="template-quick-list" class="template-row"></div>
        </div>
        <div id="low-stock-banner" class="card hidden"></div>
        <div id="expiry-banner" class="card hidden"></div>
        <div class="panel-header">
          <h2>物品列表</h2>
          <span id="item-count" class="muted"></span>
        </div>
        <div id="item-list" class="card-list"></div>
      </section>

      <section id="tab-location" class="tab-panel">
        <div class="panel-header">
          <h2>位置管理</h2>
          <div class="setting-actions">
            <button id="add-location-btn" class="btn">+ 新增位置</button>
            <button id="expand-all-btn" class="btn">展开全部</button>
            <button id="collapse-all-btn" class="btn">折叠全部</button>
            <button id="scan-location-qr-btn" class="btn">扫码位置</button>
          </div>
        </div>
        <p class="hint">拖拽节点可排序或调整父级；删除位置会提示转移物品到“未分类”。</p>
        <div id="location-tree" class="card-list"></div>
      </section>

      <section id="tab-tag" class="tab-panel">
        <div class="panel-header">
          <h2>标签管理</h2>
          <button id="add-tag-btn" class="btn">+ 新增标签</button>
        </div>
        <div id="tag-list" class="card-list"></div>
      </section>

      <section id="tab-me" class="tab-panel">
        <div class="panel-header">
          <h2>我的</h2>
        </div>
        <div class="card setting-card">
          <h3>家庭档案</h3>
          <div class="setting-actions">
            <select id="profile-select"></select>
            <button id="add-profile-btn" class="btn">新增档案</button>
          </div>
          <p id="profile-readonly-hint" class="hint hidden">当前档案为只读副本。</p>
        </div>
        <div class="card setting-card">
          <h3>提醒设置</h3>
          <div class="form-grid">
            <label>默认低库存阈值
              <input id="default-threshold-input" type="number" min="0" value="3">
            </label>
            <label>过期提醒提前天数
              <input id="expiry-days-input" type="number" min="1" value="30">
            </label>
            <label>每天提醒时间（24小时）
              <input id="notify-time-input" type="time" value="20:00">
            </label>
            <button id="save-reminder-btn" class="btn btn-primary">保存提醒设置</button>
            <button id="enable-notify-btn" class="btn">授权桌面通知</button>
          </div>
        </div>
        <div class="card setting-card">
          <h3>数据管理</h3>
          <div class="setting-actions">
            <button id="export-btn" class="btn">导出 JSON</button>
            <button id="export-encrypted-btn" class="btn">导出加密只读包</button>
            <button id="export-report-btn" class="btn">导出 HTML 报告</button>
            <label class="btn btn-file">
              导入 JSON
              <input id="import-input" type="file" accept="application/json">
            </label>
            <label class="btn btn-file">
              导入加密只读包
              <input id="import-encrypted-input" type="file" accept="application/json">
            </label>
          </div>
          <p class="hint">导入将覆盖当前数据，请先导出备份。</p>
        </div>
      </section>
    </main>

    <nav class="tabbar">
      <button class="tab-btn active" data-tab="home">首页</button>
      <button class="tab-btn" data-tab="location">位置管理</button>
      <button class="tab-btn" data-tab="tag">标签管理</button>
      <button class="tab-btn" data-tab="me">我的</button>
    </nav>
  </div>

  <div id="item-modal" class="modal hidden">
    <div class="modal-backdrop" data-close="item-modal"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h3 id="item-modal-title">新增物品</h3>
        <button class="icon-btn" data-close="item-modal">×</button>
      </div>
      <form id="item-form" class="form-grid">
        <input type="hidden" id="item-id">
        <label>名称
          <input id="item-name" required maxlength="60">
        </label>
        <label>数量
          <input id="item-quantity" type="number" min="0" required>
        </label>
        <label>房间
          <select id="room-select"></select>
        </label>
        <label>柜子/容器
          <select id="container-select"></select>
        </label>
        <label>具体位置
          <select id="spot-select"></select>
        </label>
        <label>照片（多张，单张≤2MB）
          <input id="item-photos" type="file" accept="image/*" multiple>
        </label>
        <div id="photo-preview" class="photo-preview"></div>
        <label>备注
          <textarea id="item-note" rows="3"></textarea>
        </label>
        <label>保质期（可选）
          <input id="item-expiry" type="date">
        </label>
        <label>低库存阈值（可选）
          <input id="item-threshold" type="number" min="0">
        </label>
        <label>标签（可多选）
          <select id="item-tags" multiple size="4"></select>
        </label>
        <div class="inline-actions">
          <input id="new-tag-input" placeholder="新增标签名">
          <button id="quick-add-tag-btn" type="button" class="btn">添加标签</button>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn" data-close="item-modal">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div id="simple-modal" class="modal hidden">
    <div class="modal-backdrop" data-close="simple-modal"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h3 id="simple-modal-title">编辑</h3>
        <button class="icon-btn" data-close="simple-modal">×</button>
      </div>
      <form id="simple-form" class="form-grid">
        <input type="hidden" id="simple-type">
        <input type="hidden" id="simple-id">
        <label id="simple-label">名称
          <input id="simple-name" required maxlength="60">
        </label>
        <label id="parent-label">父级位置
          <select id="simple-parent"></select>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn" data-close="simple-modal">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <div id="item-detail-modal" class="modal hidden">
    <div class="modal-backdrop" data-close="item-detail-modal"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h3>物品详情</h3>
        <button class="icon-btn" data-close="item-detail-modal">×</button>
      </div>
      <div id="item-detail-content"></div>
    </div>
  </div>

  <div id="usage-modal" class="modal hidden">
    <div class="modal-backdrop" data-close="usage-modal"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h3 id="usage-title">使用记录</h3>
        <button class="icon-btn" data-close="usage-modal">×</button>
      </div>
      <form id="usage-form" class="form-grid">
        <input type="hidden" id="usage-item-id">
        <input type="hidden" id="usage-op-type">
        <label>数量
          <input id="usage-qty" type="number" min="1" value="1" required>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn" data-close="usage-modal">取消</button>
          <button type="submit" class="btn btn-primary">确认</button>
        </div>
      </form>
    </div>
  </div>

  <div id="barcode-modal" class="modal hidden">
    <div class="modal-backdrop" data-close="barcode-modal"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h3>扫码录入</h3>
        <button class="icon-btn" data-close="barcode-modal">×</button>
      </div>
      <div id="barcode-reader" style="min-height:260px;"></div>
      <label>或手动输入条码
        <input id="barcode-input" placeholder="例如 3017620422003">
      </label>
      <button id="fetch-barcode-btn" class="btn btn-primary">查询并填充</button>
    </div>
  </div>

  <div id="batch-modal" class="modal hidden">
    <div class="modal-backdrop" data-close="batch-modal"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h3>批量录入</h3>
        <button class="icon-btn" data-close="batch-modal">×</button>
      </div>
      <form id="batch-form" class="form-grid">
        <label>目标位置
          <select id="batch-location-select"></select>
        </label>
        <label>内容（每行：名称,数量）
          <textarea id="batch-lines" rows="8" placeholder="电池,4&#10;螺丝刀,1"></textarea>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn" data-close="batch-modal">取消</button>
          <button type="submit" class="btn btn-primary">批量添加</button>
        </div>
      </form>
    </div>
  </div>

  <div id="location-modal" class="modal hidden">
    <div class="modal-backdrop" data-close="location-modal"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h3>位置详情</h3>
        <button class="icon-btn" data-close="location-modal">×</button>
      </div>
      <div id="location-detail-content"></div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
