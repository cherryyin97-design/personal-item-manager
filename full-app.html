<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>高自由度物品管理 App</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
  <style>
    :root {
      --primary: #4A90E2;
      --bg: #F5F7FA;
      --card: #FFFFFF;
      --text: #1d2a3a;
      --muted: #6f7f94;
      --danger: #e05555;
      --radius: 12px;
      --shadow: 0 4px 12px rgba(34, 60, 80, 0.08);
      --font: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --font-size: 16px;
      --card-border: 0px;
      --bg-image: none;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      font-size: var(--font-size);
      color: var(--text);
      background: var(--bg);
      background-image: var(--bg-image);
      background-size: cover;
      background-attachment: fixed;
      transition: all .3s ease;
    }
    input, select, textarea, button { font: inherit; }
    input, select, textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid #d6deea;
      border-radius: 10px;
      padding: 10px 12px;
      background: var(--card);
      color: var(--text);
    }
    button {
      min-height: 44px;
      min-width: 44px;
      border: none;
      border-radius: 10px;
      background: #e8edf4;
      color: var(--text);
      padding: 0 12px;
      cursor: pointer;
      transition: transform .1s ease, all .3s ease;
    }
    button:active { transform: scale(.96); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .app {
      max-width: 860px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 12px 12px 96px;
    }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .wrap { display: flex; gap: 8px; flex-wrap: wrap; }
    .topbar h1 { margin: 0; font-size: 1.1rem; }
    .search-wrap { margin: 12px 0; position: relative; display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    .search-results {
      position: absolute;
      left: 0; right: 52px;
      top: calc(100% + 6px);
      z-index: 8;
      max-height: 300px;
      overflow: auto;
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      border: var(--card-border) solid rgba(0,0,0,.12);
    }
    .search-item {
      width: 100%;
      text-align: left;
      border-radius: 8px;
      background: transparent;
    }
    .panel { display: none; animation: fadeIn .2s ease; }
    .panel.active { display: block; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: var(--card-border) solid rgba(0,0,0,.12);
      padding: 12px;
      margin-bottom: 10px;
      transition: all .3s ease;
    }
    .muted { color: var(--muted); font-size: .9rem; }
    .danger { color: var(--danger); font-weight: 700; }
    .chip {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      margin: 4px 6px 0 0;
      background: rgba(74, 144, 226, 0.15);
      color: var(--primary);
      font-size: .82rem;
    }
    .item {
      border: 1px solid rgba(120,140,170,.25);
      border-radius: 10px;
      padding: 10px;
      margin-top: 8px;
      animation: slideUp .2s ease;
    }
    .item.deleting { animation: fadeOutLeft .25s ease forwards; }
    .item-main { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    .item-main img { width: 66px; height: 66px; border-radius: 8px; object-fit: cover; border: 1px solid #d6deea; }
    .warning { border-left: 4px solid #f0a000; }
    .tabbar {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: var(--card);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      padding: 8px 10px max(8px, env(safe-area-inset-bottom));
      box-shadow: 0 -2px 10px rgba(0,0,0,.12);
      z-index: 20;
    }
    .tabbar button.active { background: var(--primary); color: #fff; }
    .tree ul { list-style: none; margin: 0; padding-left: 14px; }
    .tree-node { border: 1px dashed #d3dcea; border-radius: 10px; padding: 8px; margin: 8px 0; }
    .region-thumb { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; border: 1px solid #d6deea; }
    .hidden { display: none !important; }
    .modal { position: fixed; inset: 0; z-index: 40; }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.4); }
    .modal-panel {
      position: relative;
      margin: 5vh auto 0;
      width: min(94vw, 680px);
      max-height: 90vh;
      overflow: auto;
      border-radius: 14px;
      background: var(--card);
      padding: 12px;
    }
    .form-grid { display: grid; gap: 10px; }
    .form-grid label { display: grid; gap: 6px; font-size: .92rem; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 96px;
      transform: translateX(-50%);
      z-index: 60;
      background: rgba(20,30,44,.92);
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
      opacity: 0;
      transition: opacity .2s ease;
    }
    .toast.show { opacity: 1; }
    .undo-btn { margin-left: 8px; min-height: 30px; background: #fff; color: #333; }
    .loading {
      position: fixed; inset: 0; z-index: 70;
      background: rgba(0,0,0,.35);
      display: flex; align-items: center; justify-content: center;
    }
    .spinner {
      width: 52px; height: 52px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,.5);
      border-top-color: #fff;
      animation: spin 1s linear infinite;
    }
    .guide {
      position: fixed; inset: 0; z-index: 75;
      background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      color: #fff;
    }
    .guide-box { width: min(92vw, 520px); background: rgba(12,16,24,.92); border-radius: 14px; padding: 16px; }
    .voice-fab {
      position: fixed;
      right: 16px;
      bottom: 108px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      z-index: 65;
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
    }
    .voice-fab.recording { background: #e53935; }
    .voice-fab.recording::after {
      content: "";
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 2px solid rgba(229,57,53,.6);
      animation: pulse 1s infinite;
    }
    .borrow-banner { background: #ffeaea; border-left: 4px solid #d83434; color: #8e1111; }
    body.cute-mode {
      --primary: #FF9A8B !important;
      --radius: 20px !important;
      --shadow: 0 8px 20px rgba(255,154,139,.15) !important;
      --bg: #FFF0F0 !important;
      --bg-image:
        radial-gradient(circle at 20% 20%, rgba(255,183,178,.35) 0 3px, transparent 4px),
        radial-gradient(circle at 80% 40%, rgba(255,183,178,.28) 0 2px, transparent 3px),
        linear-gradient(145deg, #FFF0F0 0%, #FFE4E1 100%) !important;
    }
    body.cute-mode button { border-radius: 30px !important; }
    body.cute-mode .card { border-radius: 20px !important; }
    body.cute-mode button:active { transform: scale(.98); }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.45); opacity: 0; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOutLeft { to { opacity: 0; transform: translateX(-24px); height: 0; padding: 0; margin: 0; border: 0; } }
  </style>
</head>
<body>
  <div class="app">
    <header class="row topbar">
      <h1><span id="ledgerNameBtn" style="cursor:pointer;">我的家 ▾</span></h1>
      <button id="addItemBtn" class="btn-primary"><i class="fa fa-plus"></i> 物品</button>
    </header>

    <section class="search-wrap">
      <input id="searchInput" placeholder="搜索名称/备注/标签/区域路径">
      <button id="voiceSearchBtn"><i class="fa-solid fa-microphone"></i></button>
      <div id="searchResults" class="search-results hidden"></div>
    </section>

    <main>
      <section id="homePanel" class="panel active">
        <div id="appBanner" class="card warning hidden"></div>
        <div id="lowBanner" class="card warning hidden"></div>
        <div id="expBanner" class="card warning hidden"></div>
        <div id="unusedBanner" class="card warning hidden"></div>
        <div class="card">
          <div class="row">
            <strong>快速录入</strong>
            <button id="voiceFillBtn">语音录入</button>
          </div>
          <div class="wrap" style="margin-top:8px;">
            <label class="btn-primary" style="display:inline-flex;align-items:center;padding:0 12px;border-radius:10px;cursor:pointer;">拍照录入<input id="cameraInput" class="hidden" type="file" accept="image/*" capture="environment"></label>
            <button id="batchPhotoBtn">照片批量生成</button>
            <button id="batchTextBtn">批量录入</button>
          </div>
          <div id="quickTemplateBox" style="margin-top:8px;"></div>
        </div>
        <div class="card"><strong>最近常用（7天）</strong><div id="recentUsed"></div></div>
        <div class="card"><strong>长期未用</strong><div id="longUnused"></div></div>
        <div class="card"><strong>智能建议</strong><div id="smartSuggest"></div></div>
        <div class="card"><strong>物品列表</strong><div id="itemList"></div></div>
      </section>

      <section id="regionPanel" class="panel">
        <div class="card">
          <div class="wrap">
            <button id="addRegionBtn" class="btn-primary">+ 区域</button>
            <button id="expandAllBtn">展开</button>
            <button id="collapseAllBtn">折叠</button>
          </div>
          <p class="muted">无限嵌套区域，支持拖拽移动。免费模式有限制，点击“模拟付费”可解除。</p>
        </div>
        <div class="card tree"><div id="regionTree"></div></div>
      </section>

      <section id="tagPanel" class="panel">
        <div class="card">
          <div class="row"><strong>标签管理</strong><button id="addTagBtn">+ 标签</button></div>
          <div id="tagList"></div>
        </div>
        <div class="card">
          <strong>自动分类关键词库</strong>
          <p class="muted">格式：标签:关键词1|关键词2</p>
          <textarea id="keywordEditor" rows="8"></textarea>
          <button id="saveKeywordBtn" class="btn-primary" style="margin-top:8px;">保存关键词库</button>
        </div>
      </section>

      <section id="shoppingPanel" class="panel">
        <div class="card">
          <div class="row"><strong>购物清单</strong><button id="addShoppingBtn" class="btn-primary">+ 手动添加</button></div>
          <div class="wrap" style="margin-top:8px;">
            <button id="clearDoneShoppingBtn">清空已完成</button>
            <button id="exportShoppingTextBtn">导出文本</button>
            <button id="batchDeleteShoppingBtn" class="btn-danger">批量删除</button>
          </div>
        </div>
        <div class="card"><div id="shoppingList"></div></div>
      </section>

      <section id="mePanel" class="panel">
        <div class="card">
          <strong>提醒设置</strong>
          <div class="form-grid" style="margin-top:8px;">
            <label>低库存默认阈值<input id="setLow" type="number" min="0"></label>
            <label>过期提前天数<input id="setExp" type="number" min="1"></label>
            <label>长期未用天数<input id="setUnused" type="number" min="1"></label>
            <label>每日检查时间<input id="setTime" type="time"></label>
          </div>
          <div class="wrap" style="margin-top:8px;">
            <button id="saveReminderBtn" class="btn-primary">保存提醒</button>
            <button id="notifyAuthBtn">通知授权</button>
          </div>
        </div>

        <div class="card">
          <strong>主题设置</strong>
          <div class="form-grid" style="margin-top:8px;">
            <label>主色
              <select id="themePrimary">
                <option value="#4A90E2">默认蓝</option>
                <option value="#52C41A">护眼绿</option>
                <option value="#FA8C16">暖阳橙</option>
                <option value="#722ED1">优雅紫</option>
                <option value="#EB2F96">樱花粉</option>
              </select>
            </label>
            <label>背景类型
              <select id="themeBgType">
                <option value="solid">纯色</option>
                <option value="gradient">渐变</option>
                <option value="image">图片</option>
              </select>
            </label>
            <label>纯色背景
              <select id="themeBgColor">
                <option value="#F5F7FA">浅灰</option>
                <option value="#E8F7FF">浅蓝</option>
                <option value="#F6FFED">浅绿</option>
                <option value="#FFF7E6">浅橙</option>
                <option value="#FFF0F6">浅粉</option>
              </select>
            </label>
            <label>渐变背景
              <select id="themeGradient">
                <option value="linear-gradient(135deg,#f6d365 0%,#fda085 100%)">晨曦</option>
                <option value="linear-gradient(135deg,#89f7fe 0%,#66a6ff 100%)">海洋</option>
                <option value="linear-gradient(135deg,#434343 0%,#000000 100%)">暮色</option>
              </select>
            </label>
            <label>背景图片<input id="themeBgImageFile" type="file" accept="image/*"></label>
            <label>圆角
              <select id="themeRadius"><option value="8">小8</option><option value="12">中12</option><option value="20">大20</option></select>
            </label>
            <label>阴影
              <select id="themeShadow"><option value="none">无</option><option value="light">轻</option><option value="mid">中</option><option value="heavy">重</option></select>
            </label>
            <label>卡片边框
              <select id="themeBorder"><option value="0">不显示</option><option value="1">显示</option></select>
            </label>
            <label>字体
              <select id="themeFont">
                <option value="system">系统默认</option>
                <option value="'Noto Sans SC','Source Han Sans SC',sans-serif">思源黑体</option>
                <option value="'SimSun',serif">宋体</option>
                <option value="'KaiTi',serif">楷体</option>
              </select>
            </label>
            <label>字号
              <select id="themeFontSize"><option value="14">14</option><option value="16">16</option><option value="18">18</option></select>
            </label>
          </div>
          <button id="saveThemeBtn" class="btn-primary" style="margin-top:8px;">保存主题</button>
        </div>

        <div class="card">
          <strong id="fontLangTitle">字体与语言</strong>
          <div class="form-grid" style="margin-top:8px;">
            <label id="fontModeLabel">字体设置
              <select id="fontModeSelect">
                <option value="system">系统默认</option>
                <option value="rounded">圆体</option>
                <option value="black">黑体</option>
                <option value="hand">手写体</option>
              </select>
            </label>
            <label id="languageLabel">语言 / Language
              <select id="languageSelect">
                <option value="zh-CN">简体中文</option>
                <option value="zh-TW">繁體中文</option>
                <option value="en">English</option>
              </select>
            </label>
            <label id="cuteModeLabel">可爱模式
              <select id="cuteModeSelect">
                <option value="off">关闭</option>
                <option value="on">开启</option>
              </select>
            </label>
          </div>
          <button id="saveUiPrefBtn" class="btn-primary" style="margin-top:8px;">保存字体与语言</button>
        </div>

        <div class="card">
          <strong>账本与数据</strong>
          <div class="wrap" style="margin-top:8px;">
            <button id="addLedgerBtn">新增账本</button>
            <button id="shareLedgerBtn">生成7天只读链接</button>
            <button id="simulatePaidBtn" class="btn-primary">模拟付费</button>
          </div>
          <div id="paidState" class="muted" style="margin-top:6px;"></div>
          <div id="shareLinks" style="margin-top:8px;"></div>
          <div class="wrap" style="margin-top:8px;">
            <button id="exportJsonBtn">导出JSON</button>
            <label class="btn-primary" style="display:inline-flex;align-items:center;padding:0 12px;border-radius:10px;cursor:pointer;">导入JSON<input id="importJsonInput" class="hidden" type="file" accept="application/json"></label>
          </div>
        </div>

        <div class="card"><strong>回收站（30天内可恢复）</strong><div id="trashBox"></div></div>
      </section>
    </main>
  </div>

  <nav class="tabbar">
    <button class="active" data-panel="homePanel">首页</button>
    <button data-panel="regionPanel">位置</button>
    <button data-panel="tagPanel">标签</button>
    <button data-panel="shoppingPanel">购物</button>
    <button data-panel="mePanel">我的</button>
  </nav>

  <button id="voiceFab" class="voice-fab" title="语音入口"><i class="fa-solid fa-microphone"></i></button>
  <div id="toast" class="toast"></div>
  <div id="loading" class="loading hidden"><div class="spinner"></div></div>
  <div id="guide" class="guide hidden">
    <div class="guide-box">
      <h3 id="guideTitle">新手引导</h3>
      <p id="guideText"></p>
      <button id="guideNextBtn" class="btn-primary">下一步</button>
    </div>
  </div>
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-panel">
      <div class="row"><h3 id="modalTitle" style="margin:0;"></h3><button data-close>×</button></div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
  /* =========================================================
   * 高自由度物品管理 App（单文件交付）
   * 存储：localStorage（主数据） + IndexedDB/localForage（图片）
   * 说明：
   * 1) 保留并整合：无限区域、主题、多账本、提醒、撤销、新手引导、购物清单、关联记录、语音功能。
   * 2) 语音解析完全前端实现（Web Speech API + 正则关键词匹配），无外部AI依赖。
   * ========================================================= */

  const APP_KEY = "hf_item_manager_v1";
  const PHOTO_DB = localforage.createInstance({ name: "hf_item_manager_photos" });
  const UNC = "uncategorized";

  const state = {

  };

      shop_manual_add: "手动添加", priority: "优先级", high: "高", mid: "中", low: "低", purchased: "已购买", add_to_stock: "添加到库存",
      rec_borrow: "借用/归还", rec_repair: "维修", rec_move: "位置变动", rec_exp: "使用心得", borrower: "借用人", expected_return: "预计归还日期",
      voice_click: "点击录音", voice_parsing: "识别中…", voice_fail: "解析失败", voice_unsupported: "当前浏览器不支持语音功能",

      theme_settings: "主題設定", font_settings: "字體設定", lang_settings: "語言設定", simulate_paid: "模擬付費", export_data: "匯出資料", import_data: "匯入資料",
      shop_manual_add: "手動新增", priority: "優先級", high: "高", mid: "中", low: "低", purchased: "已購買", add_to_stock: "加入庫存",
      rec_borrow: "借用/歸還", rec_repair: "維修", rec_move: "位置變動", rec_exp: "使用心得", borrower: "借用人", expected_return: "預計歸還日期",
      voice_click: "點擊錄音", voice_parsing: "辨識中…", voice_fail: "解析失敗", voice_unsupported: "目前瀏覽器不支援語音",

      empty_cute: "📦🐱✨這裡空空的，快加東西吧~", empty_normal: "暫無資料"
    },

  function regionById(id) { return currentLedger().regions.find(r => r.id === id); }
  function childrenOf(parentId) { return currentLedger().regions.filter(r => r.parentId === parentId); }
  function pathArray(regionId) {
    const out = [];
    let cur = regionById(regionId);
    while (cur) {
      out.unshift(cur);
      if (cur.parentId === null) break;
      cur = regionById(cur.parentId);
    }
    return out;
  }
  function pathStr(regionId) { return pathArray(regionId).map(x => x.name).join(" > ") || "未分类"; }
  function descendants(id) {
    const out = [];
    const stack = [id];
    while (stack.length) {
      const cur = stack.pop();
      out.push(cur);
      childrenOf(cur).forEach(c => stack.push(c.id));
    }
    return out;
  }
  function daysDiff(dateStr) { return Math.ceil((new Date(dateStr).getTime() - Date.now()) / 86400000); }
  function similar(a, b) {
    const x = a.toLowerCase(); const y = b.toLowerCase();
    return x === y || x.includes(y) || y.includes(x);
  }

  function applyTheme() {
    const t = state.data.settings.theme;
    document.documentElement.style.setProperty("--primary", t.primary);
    document.documentElement.style.setProperty("--radius", `${t.radius}px`);
    document.documentElement.style.setProperty("--font-size", `${t.fontSize}px`);
    document.documentElement.style.setProperty("--card-border", `${t.border}px`);
    // 字体优先级：用户字体设置 > 主题字体；可爱模式下若用户未单独设置，则优先圆体
    const fontMode = state.data.settings.fontMode || "system";
    const effectiveFontMode = (state.data.settings.cuteMode && fontMode === "system") ? "rounded" : fontMode;
    if (effectiveFontMode === "system") {
      if (t.font === "system") document.documentElement.style.setProperty("--font", `"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif`);
      else document.documentElement.style.setProperty("--font", t.font);
      document.body.style.fontWeight = "400";
    } else if (effectiveFontMode === "rounded") {
      document.documentElement.style.setProperty("--font", `"PingFang SC","Microsoft YaHei","Apple SD Gothic Neo",sans-serif`);
      document.body.style.fontWeight = "350";
    } else if (effectiveFontMode === "black") {
      document.documentElement.style.setProperty("--font", `"Helvetica Neue","Roboto","Arial",sans-serif`);
      document.body.style.fontWeight = "500";
    } else if (effectiveFontMode === "hand") {
      document.documentElement.style.setProperty("--font", `"KaiTi","cursive","Comic Neue",sans-serif`);
      document.body.style.fontWeight = "400";
    }
    if (t.shadow === "none") document.documentElement.style.setProperty("--shadow", "none");
    if (t.shadow === "light") document.documentElement.style.setProperty("--shadow", "0 4px 12px rgba(34,60,80,.08)");
    if (t.shadow === "mid") document.documentElement.style.setProperty("--shadow", "0 8px 20px rgba(34,60,80,.14)");
    if (t.shadow === "heavy") document.documentElement.style.setProperty("--shadow", "0 12px 28px rgba(34,60,80,.2)");
    if (t.bgType === "solid") {
      document.documentElement.style.setProperty("--bg", t.bgColor);
      document.documentElement.style.setProperty("--bg-image", "none");
    } else if (t.bgType === "gradient") {
      document.documentElement.style.setProperty("--bg-image", t.gradient);
      document.documentElement.style.setProperty("--bg", "#F5F7FA");
    } else {
      document.documentElement.style.setProperty("--bg-image", t.bgImageData ? `url(${t.bgImageData})` : "none");
      document.documentElement.style.setProperty("--bg", "#F5F7FA");
    }
    document.body.classList.toggle("cute-mode", !!state.data.settings.cuteMode);
  }

  function renderBanners() {
    const items = currentLedger().items;
    const low = items.filter(i => Number(i.quantity) <= Number(i.lowStockThreshold ?? state.data.settings.lowThreshold));
    const exp = items.map(i => ({ i, d: i.expiryDate ? daysDiff(i.expiryDate) : 99999 })).filter(x => x.d <= Number(state.data.settings.expiryDays)).sort((a,b) => a.d - b.d);
    const unused = items.filter(i => {
      const last = [...(i.usageRecords || [])].slice(-1)[0];
      const base = last ? new Date(last.time) : new Date(i.createdAt);
      return Date.now() - base.getTime() > Number(state.data.settings.unusedDays) * 86400000;
    });
    const dueBorrow = items.map(i => ({ item: i, rec: getOutstandingBorrow(i) }))
      .filter(x => x.rec?.expectedReturnDate)

      .filter(x => x.d <= 3);

  function keywordAutoTags(name) {
    const out = [];
    const rules = currentLedger().keywordRules || {};
    Object.entries(rules).forEach(([tagName, words]) => {
      if ((words || []).some(w => name.includes(w))) {
        let tag = currentLedger().tags.find(t => t.name === tagName);
        if (!tag) {
          tag = { id: uid("tag"), name: tagName };
          currentLedger().tags.push(tag);
        }
        out.push(tag.id);
      }
    });
    return [...new Set(out)];
  }

  function buildSuggestions() {
    const out = [];
    const items = currentLedger().items;
    const map = {};
    items.forEach(i => {
      map[i.name] ||= {};
      map[i.name][i.regionId] = (map[i.name][i.regionId] || 0) + 1;
    });
    items.forEach(i => {
      const top = Object.entries(map[i.name] || {}).sort((a,b) => b[1]-a[1])[0];
      if (top && top[0] !== i.regionId && top[1] >= 2) out.push(`${i.name} 通常放在 ${pathStr(top[0])}，当前在 ${pathStr(i.regionId)}。`);
    });
    items.forEach(i => {
      const c = (i.usageRecords || []).filter(r => Date.now() - new Date(r.time).getTime() <= 7 * 86400000).length;
      if (c >= 3 && pathArray(i.regionId).length >= 4) out.push(`高频物品“${i.name}”位置较深，建议前移。`);
    });
    return [...new Set(out)].slice(0, 8);
  }

    el.longUnused.innerHTML = items.filter(i => {

  function applySearchDropdown() {
    const query = el.searchInput.value.trim().toLowerCase();
    if (!query) {
      el.searchResults.classList.add("hidden");
      el.searchResults.innerHTML = "";
      return;
    }
    const terms = query.split(/\s+/).filter(Boolean);
    const hits = currentLedger().items.map(i => {
      let score = 0;
      const n = i.name.toLowerCase();
      const note = (i.note || "").toLowerCase();
      const tags = (i.tags || []).map(t => currentLedger().tags.find(x => x.id === t)?.name || "").join(" ").toLowerCase();
      const regionPath = pathStr(i.regionId).toLowerCase();
      terms.forEach(t => {
        if (n.includes(t)) score += 5;
        if (tags.includes(t)) score += 3;
        if (note.includes(t)) score += 2;
        if (regionPath.includes(t)) score += 2;
      });
      return { i, score };
    }).filter(x => x.score > 0).sort((a,b) => b.score - a.score);
    el.searchResults.classList.remove("hidden");
    el.searchResults.innerHTML = hits.length
      ? hits.map(x => `<button class="search-item" data-act="jumpItem" data-id="${x.i.id}"><strong>${x.i.name}</strong>（相关度${x.score}）<div class="muted">${pathStr(x.i.regionId)}</div></button>`).join("")
      : `<div class="muted" style="padding:8px;">无匹配结果</div>`;
  }

  function freeRegionLimit(parentId) {
    if (state.data.isPaid) return { ok: true };
    const regions = currentLedger().regions;
    const tops = regions.filter(r => r.parentId === null && r.id !== UNC);
    if (parentId === null && tops.length >= 2) return { ok: false, msg: "升级为付费用户可创建无限区域" };
    if (parentId !== null) {
      const p = regionById(parentId);
      if (!p) return { ok: true };
      const top = pathArray(p.id).find(x => x.parentId === null && x.id !== UNC);
      if (top && parentId === top.id && childrenOf(top.id).length >= 2) return { ok: false, msg: "升级为付费用户可创建无限区域" };
    }
    return { ok: true };
  }

  async function openItemForm(editId = "", preload = {}) {
    const ledger = currentLedger();
    const item = editId ? ledger.items.find(i => i.id === editId) : null;
    const tempPhotos = [];
    if (item?.photoKeys?.length) {
      for (const key of item.photoKeys) {
        const d = await getPhoto(key);
        if (d) tempPhotos.push({ key, data: d, old: true });
      }
    }
    if (preload.photoData) tempPhotos.push({ key: "", data: preload.photoData, old: false });
    const preloadTagIds = (preload.tagIds || []).slice();
    (preload.tagNames || []).forEach(name => {
      let tag = ledger.tags.find(t => t.name === name);
      if (!tag) {
        tag = { id: uid("tag"), name };
        ledger.tags.push(tag);
      }
      preloadTagIds.push(tag.id);
    });
    const selectedTagIds = item?.tags || preloadTagIds;
    openModal(editId ? "编辑物品" : "新增物品", `
      <form id="itemForm" class="form-grid">
        <label>名称<input id="fName" required value="${item?.name || preload.name || `物品-${Date.now()}`}"></label>
        <label>数量<input id="fQty" type="number" min="0" required value="${item?.quantity ?? preload.quantity ?? 1}"></label>
        <label>备注<textarea id="fNote" rows="2">${item?.note || ""}</textarea></label>
        <label>保质期<input id="fExp" type="date" value="${item?.expiryDate || ""}"></label>
        <label>低库存阈值<input id="fTh" type="number" min="0" value="${item?.lowStockThreshold ?? ""}"></label>
        <label>标签（多选）
          <select id="fTags" multiple size="4">${ledger.tags.map(t => `<option value="${t.id}" ${selectedTagIds.includes(t.id) ? "selected" : ""}>${t.name}</option>`).join("")}</select>
        </label>
        <label>位置（树形选择）</label>
        <input id="fRegionId" type="hidden" value="${item?.regionId || preload.regionId || UNC}">
        <div id="fRegionTree" class="card">${renderRegionSelector(item?.regionId || preload.regionId || UNC)}</div>
        <div><strong>最近位置：</strong>${ledger.recentRegionIds.slice(0,5).map(id => regionById(id)).filter(Boolean).map(r => `<button type="button" class="chip" data-act="pickRecentRegion" data-id="${r.id}">${pathStr(r.id)}</button>`).join("") || "<span class='muted'>暂无</span>"}</div>
        <div class="row"><strong>模板</strong><select id="fTpl"><option value="">从模板创建</option>${ledger.templates.map(t => `<option value="${t.id}">${t.name}</option>`).join("")}</select></div>
        <div class="row"><strong>照片</strong><label class="btn-primary" style="display:inline-flex;align-items:center;padding:0 12px;border-radius:10px;cursor:pointer;">上传<input id="fPhotoInput" class="hidden" type="file" accept="image/*" multiple></label></div>
        <div id="fPhotoBox"></div>
        <div class="wrap">
          <button type="button" data-close>取消</button>
          <button type="button" id="saveTplBtn">保存模板</button>
          <button class="btn-primary" type="submit">保存</button>
        </div>
      </form>
    `);
    const photoBox = q("#fPhotoBox");
    const drawPhotos = () => {
      photoBox.innerHTML = tempPhotos.map((x, idx) => `<span class="chip">图片${idx+1}<button type="button" data-rm="${idx}">x</button></span>`).join("") || "<span class='muted'>无图片</span>";
    };
    drawPhotos();
    photoBox.onclick = (e) => {
      if (e.target.dataset.rm !== undefined) {
        tempPhotos.splice(Number(e.target.dataset.rm), 1);
        drawPhotos();
      }
    };
    q("#fPhotoInput").onchange = async (e) => {
      showLoading(true);
      for (const file of [...e.target.files]) {
        if (file.size > 2 * 1024 * 1024) continue;
        const d = await fileToDataURL(file);
        tempPhotos.push({ key: "", data: d, old: false });
      }
      drawPhotos();
      showLoading(false);
      e.target.value = "";
    };
    q("#fRegionTree").onclick = (e) => {
      const id = e.target.dataset.pickRegion;
      if (!id) return;
      q("#fRegionId").value = id;
      q("#fRegionTree").querySelectorAll("[data-pick-region]").forEach(btn => btn.style.outline = "");
      e.target.style.outline = "2px solid var(--primary)";
    };
    q("#fTpl").onchange = () => {
      const tpl = ledger.templates.find(t => t.id === q("#fTpl").value);
      if (!tpl) return;
      q("#fName").value = tpl.name;
      q("#fQty").value = tpl.defaultQty || 1;
      [...q("#fTags").options].forEach(o => o.selected = (tpl.defaultTagIds || []).includes(o.value));
      const target = ledger.regions.find(r => pathStr(r.id).includes(tpl.locationType || ""));
      if (target) q("#fRegionId").value = target.id;
    };
    q("#saveTplBtn").onclick = () => {
      if (!isEditable()) return toast("当前账本只读");
      const rid = q("#fRegionId").value || UNC;
      const locationType = pathArray(rid)[1]?.name || pathArray(rid)[0]?.name || "常用区";
      ledger.templates.push({
        id: uid("tpl"),
        name: q("#fName").value.trim() || "未命名模板",
        defaultQty: Number(q("#fQty").value || 1),
        defaultTagIds: [...q("#fTags").selectedOptions].map(o => o.value),
        locationType
      });
      saveData();
      toast("模板已保存");
    };
    q("#fName").onblur = () => {
      const n = q("#fName").value.trim();
      const auto = keywordAutoTags(n);
      [...q("#fTags").options].forEach(o => { if (auto.includes(o.value)) o.selected = true; });
      const dups = ledger.items.filter(x => x.id !== editId && similar(x.name, n));
      if (dups.length) {
        confirm(`检测到相似物品：\n${dups.slice(0,3).map(d => `${d.name} @ ${pathStr(d.regionId)}（${d.quantity}）`).join("\n")}\n是否继续保存？`);
      }
      const suggest = [...ledger.items].reverse().find(x => x.name === n || (x.tags || []).some(t => auto.includes(t)));
      if (suggest && suggest.regionId !== q("#fRegionId").value && confirm(`建议位置：${pathStr(suggest.regionId)}，是否采用？`)) {
        q("#fRegionId").value = suggest.regionId;
      }
    };
    q("#itemForm").onsubmit = async (e) => {
      e.preventDefault();
      if (!isEditable()) return toast("当前账本只读");
      const regionId = q("#fRegionId").value || UNC;
      const payload = {
        id: editId || uid("i"),
        name: q("#fName").value.trim(),
        quantity: Number(q("#fQty").value || 0),
        regionId,
        photoKeys: [],
        note: q("#fNote").value.trim(),
        createdAt: item?.createdAt || new Date().toISOString(),
        expiryDate: q("#fExp").value || null,
        lowStockThreshold: q("#fTh").value === "" ? null : Number(q("#fTh").value),
        tags: [...q("#fTags").selectedOptions].map(o => o.value),
        usageRecords: item?.usageRecords || [],
        records: item?.records || []
      };
      if (!payload.tags.length) payload.tags = keywordAutoTags(payload.name);
      if (item?.photoKeys?.length) {
        for (const key of item.photoKeys) if (!tempPhotos.find(x => x.key === key)) await deletePhoto(key);
      }
      for (const ph of tempPhotos) payload.photoKeys.push(ph.old ? ph.key : await putPhoto(ph.data));
      const idx = ledger.items.findIndex(x => x.id === payload.id);
      if (idx >= 0) {
        const oldRegion = ledger.items[idx].regionId;
        if (oldRegion !== regionId) {
          payload.records.push({
            id: uid("rec"),
            type: "move",
            description: `从 ${pathStr(oldRegion)} 移动到 ${pathStr(regionId)}`,
            date: new Date().toISOString().slice(0,10),
            imageKey: "",
            borrower: "",
            expectedReturnDate: ""
          });
        }
        ledger.items[idx] = payload;
      } else {
        ledger.items.push(payload);
      }
      ledger.recentRegionIds = [regionId, ...ledger.recentRegionIds.filter(x => x !== regionId)].slice(0,5);
      saveData();
      closeModal();
      renderAll();
    };
  }

        <div id="recImagePreview"></div>
        <div class="wrap"><button type="button" data-close>取消</button><button class="btn-primary" type="submit">保存</button></div>
      </form>
    `);
    let imgData = rec?.imageKey ? await getPhoto(rec.imageKey) : "";
    const draw = () => {
      q("#recImagePreview").innerHTML = imgData ? `<img src="${imgData}" style="width:72px;height:72px;object-fit:cover;border-radius:8px;"><button type="button" id="rmRecImgBtn">移除</button>` : "<span class='muted'>无图片</span>";
      const b = q("#rmRecImgBtn");
      if (b) b.onclick = () => { imgData = ""; draw(); };
    };
    draw();
    q("#recType").onchange = () => {
      const t = q("#recType").value;
      q("#borrowExtra").classList.toggle("hidden", !(t === "borrow" || t === "return"));
    };
    q("#recImageInput").onchange = async (e) => {
      const f = e.target.files?.[0];
      if (!f) return;
      imgData = await fileToDataURL(f);
      draw();
    };
    q("#recordForm").onsubmit = async (e) => {
      e.preventDefault();
      if (!isEditable()) return toast("当前账本只读");

    if (idx < 0) return;
    const dom = document.getElementById(`item_${itemId}`);
    const removed = list[idx];

    setTimeout(() => {
      list.splice(idx, 1);
      const wrap = { id: uid("trash"), deletedAt: new Date().toISOString(), data: removed };
      currentLedger().trash.items.push(wrap);
      saveData();
      renderAll();
      toast("已删除", true, () => {
        currentLedger().trash.items = currentLedger().trash.items.filter(t => t.id !== wrap.id);
        currentLedger().items.push(removed);
        saveData();
        renderAll();
      });
    }, 220);
  }

  function deleteRegion(regionId) {
    if (!isEditable()) return toast("当前账本只读");
    if (regionId === UNC) return;
    if (!confirm("删除该区域？其子区域与物品将移入未分类。")) return;
    const ids = new Set(descendants(regionId));
    const removed = currentLedger().regions.filter(r => ids.has(r.id));
    currentLedger().regions = currentLedger().regions.filter(r => !ids.has(r.id));
    currentLedger().items.forEach(i => { if (ids.has(i.regionId)) i.regionId = UNC; });
    removed.forEach(r => currentLedger().trash.regions.push({ id: uid("trash"), deletedAt: new Date().toISOString(), data: r }));
    saveData();
    renderAll();
    toast("区域已删除", true, () => {
      currentLedger().regions.push(...removed);
      currentLedger().trash.regions = currentLedger().trash.regions.filter(t => !removed.some(r => r.id === t.data.id));
      saveData();
      renderAll();
    });
  }

  function runReminderCheck() {
    const now = new Date();
    const hhmm = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
    const day = now.toISOString().slice(0,10);
    if (hhmm !== state.data.settings.remindTime || state.data.settings.lastNotifyDate === day) return;
    const items = currentLedger().items;
    const low = items.filter(i => Number(i.quantity) <= Number(i.lowStockThreshold ?? state.data.settings.lowThreshold));
    const exp = items.filter(i => i.expiryDate && daysDiff(i.expiryDate) <= Number(state.data.settings.expiryDays));
    const unused = items.filter(i => {
      const last = [...(i.usageRecords || [])].slice(-1)[0];
      const base = last ? new Date(last.time) : new Date(i.createdAt);
      return Date.now() - base.getTime() > Number(state.data.settings.unusedDays) * 86400000;
    });
    const borrowDue = items.map(i => ({ i, b: getOutstandingBorrow(i) })).filter(x => x.b?.expectedReturnDate && daysDiff(x.b.expectedReturnDate) <= 3);
    if (low.length || exp.length || unused.length || borrowDue.length) {
      el.appBanner.classList.remove("hidden");
      el.appBanner.innerHTML = `提醒：低库存 ${low.length}，临期 ${exp.length}，长期未用 ${unused.length}，借用到期 ${borrowDue.length}`;
      if ("Notification" in window && Notification.permission === "granted") {
        const n = new Notification("物品提醒", { body: `低库存${low.length}，临期${exp.length}，长期未用${unused.length}，借用到期${borrowDue.length}` });
        n.onclick = () => { window.focus(); switchPanel("homePanel"); };
      }
      state.data.settings.lastNotifyDate = day;
      saveData();
    }
  }

  function chineseToNumber(raw) {
    if (!raw) return 1;
    if (/^\d+$/.test(raw)) return Number(raw);
    const map = { 零:0, 一:1, 二:2, 两:2, 三:3, 四:4, 五:5, 六:6, 七:7, 八:8, 九:9 };
    if (raw === "十") return 10;
    if (raw.includes("十")) {
      const [l, r] = raw.split("十");
      const left = l ? (map[l] ?? 1) : 1;
      const right = r ? (map[r] ?? 0) : 0;
      return left * 10 + right;
    }
    return map[raw] ?? 1;
  }

  /* =========================
   * 语音解析核心（重点中文注释）
   * 目标：从自然语言中提取 名称/数量/位置/标签
   * 例：
   * - 把螺丝刀放到客厅工具箱
   * - 买三节五号电池放在电视柜抽屉里
   * - 添加扳手，数量2，标签工具
   * ========================= */
  function parseVoiceItemText(text) {
    const src = text.replace(/[，。,.！!]/g, " ").replace(/\s+/g, " ").trim();
    // 1) 标签提取：#工具 或 标签工具
    const hashTags = src.match(/#([\u4e00-\u9fa5A-Za-z0-9_]+)/g) || [];
    const tagNames = hashTags.map(t => t.replace("#", "").trim()).filter(Boolean);
    const tagWord = src.match(/标签[:：]?\s*([\u4e00-\u9fa5A-Za-z0-9_]+)/);
    if (tagWord?.[1]) tagNames.push(tagWord[1]);

    // 2) 数量提取：支持“数量2”“买三节”“两把”
    let quantity = 1;
    const qtyMatch = src.match(/(?:数量|买|采购|拿|要|加)\s*([零一二两三四五六七八九十百\d]+)|([零一二两三四五六七八九十百\d]+)\s*(个|把|节|瓶|盒|包|支|件)/);
    if (qtyMatch) quantity = chineseToNumber(qtyMatch[1] || qtyMatch[2]);

    // 3) 位置提取：取“放到/放在/放进/存放在/放入”之后的文本
    const locMatch = src.match(/(?:放到|放在|放进|存放在|放入)\s*([\u4e00-\u9fa5A-Za-z0-9]+(?:里|中|里面)?)/);
    const regionText = locMatch?.[1]?.replace(/(里|中|里面)$/,"").trim() || "";

    // 4) 名称提取：移除动作词、数量短语、标签短语、位置短语后剩余文本
    let name = src
      .replace(/#([\u4e00-\u9fa5A-Za-z0-9_]+)/g, "")
      .replace(/标签[:：]?\s*[\u4e00-\u9fa5A-Za-z0-9_]+/g, "")
      .replace(/(?:放到|放在|放进|存放在|放入).*/g, "")
      .replace(/(?:添加|加入|买|采购|把|将)\s*/g, "")
      .replace(/数量[:：]?\s*[零一二两三四五六七八九十百\d]+/g, "")
      .replace(/[零一二两三四五六七八九十百\d]+\s*(个|把|节|瓶|盒|包|支|件)/g, "")
      .replace(/[,\s]+/g, " ")
      .trim();
    if (!name) name = src;

    return { name, quantity: Math.max(1, quantity || 1), regionText, tagNames: [...new Set(tagNames)] };
  }

  function regionMatchesByText(text) {
    if (!text) return [];
    const norm = text.replace(/\s+/g, "").toLowerCase();
    return currentLedger().regions.filter(r => {
      const n1 = r.name.replace(/\s+/g, "").toLowerCase();
      const n2 = pathStr(r.id).replace(/\s+/g, "").toLowerCase().replace(/>/g, "");
      return n1.includes(norm) || n2.includes(norm) || norm.includes(n1);
    });
  }

  function resolveRegionFromVoiceText(regionText) {
    return new Promise((resolve) => {
      const m = regionMatchesByText(regionText);
      if (!regionText || m.length === 0) return resolve(UNC);
      if (m.length === 1) return resolve(m[0].id);
      openModal("选择匹配区域", `
        <div class="form-grid">
          <div class="muted">匹配到多个区域，请选择：</div>
          ${m.map(x => `<button data-act="pickVoiceRegion" data-id="${x.id}" style="text-align:left;">${pathStr(x.id)}</button>`).join("")}
          <button data-act="pickVoiceRegion" data-id="${UNC}">使用未分类</button>
        </div>
      `);
      const handler = (e) => {
        if (e.target.dataset.act !== "pickVoiceRegion") return;
        document.removeEventListener("click", handler);
        const id = e.target.dataset.id || UNC;
        closeModal();
        resolve(id);
      };
      document.addEventListener("click", handler);
    });
  }

  function hasSpeechSupport() { return !!(window.SpeechRecognition || window.webkitSpeechRecognition); }

  async function ensureMicPermission() {
    if (!navigator.mediaDevices?.getUserMedia) return false;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      stream.getTracks().forEach(t => t.stop());
      return true;
    } catch {
      return false;
    }
  }

  function stopSpeech() {
    if (state.speechRecognition) {
      try { state.speechRecognition.stop(); } catch {}
    }
    state.speechRecognition = null;
    el.voiceFab.classList.remove("recording");
  }

  function startSpeech(mode, onResult) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return toast(t("voice_unsupported"));
    const rec = new SR();
    state.speechRecognition = rec;
    rec.lang = "zh-CN";
    rec.interimResults = false;
    rec.continuous = false;
    rec.onstart = () => {
      el.voiceFab.classList.add("recording");
      toast("正在录音...");
    };
    rec.onspeechend = () => toast("识别中…");
    rec.onresult = (e) => {
      const text = e.results?.[0]?.[0]?.transcript || "";
      onResult(text);
      stopSpeech();
    };
    rec.onerror = () => {
      stopSpeech();
      toast(mode === "search" ? "语音搜索失败" : "语音录入失败");
    };
    rec.onend = () => el.voiceFab.classList.remove("recording");
    rec.start();
  }

  async function runVoiceSearch() {
    if (!hasSpeechSupport()) return toast(t("voice_unsupported"));
    const ok = await ensureMicPermission();
    if (!ok) return toast("需要麦克风权限才能使用语音功能");
    startSpeech("search", (text) => {
      el.searchInput.value = text;
      applySearchDropdown();
      toast(`识别结果：${text}`);
    });
  }

  async function runVoiceFill() {
    if (!hasSpeechSupport()) return toast(t("voice_unsupported"));
    const ok = await ensureMicPermission();
    if (!ok) return toast("需要麦克风权限才能使用语音功能");
    startSpeech("fill", async (text) => {
      const parsed = parseVoiceItemText(text);
      let regionId = UNC;
      if (parsed.regionText) regionId = await resolveRegionFromVoiceText(parsed.regionText);
      const failed = !parsed.name || !parsed.regionText;
      if (failed) {
        toast("解析部分失败，已按默认值填充");
        openItemForm("", { name: text || `语音物品-${Date.now()}`, quantity: parsed.quantity || 1, regionId: UNC, tagNames: parsed.tagNames });
        return;
      }
      toast("解析成功，已预填");
      openItemForm("", { name: parsed.name, quantity: parsed.quantity || 1, regionId, tagNames: parsed.tagNames });
    });
  }

    if (state.data.tutorialDone) return;
    const steps = [
      { title: "第1步", text: "进入“位置”页，点击“+区域”创建第一个区域（如客厅）。" },
      { title: "第2步", text: "点击右上角“+物品”，在树形位置中选择区域后保存。" },

    ];
    let idx = 0;
    el.guide.classList.remove("hidden");
    const draw = () => {
      el.guideTitle.textContent = steps[idx].title;
      el.guideText.textContent = steps[idx].text;
      el.guideNextBtn.textContent = idx === steps.length - 1 ? "完成" : "下一步";
    };
    draw();

      idx += 1;
      if (idx >= steps.length) {
        state.data.tutorialDone = true;
        saveData();
        el.guide.classList.add("hidden");
        return;
      }
      draw();
    };

  function checkShareView() {
    const p = new URLSearchParams(location.search);
    const id = p.get("share");
    if (!id) return false;
    const s = state.data.sharedLinks.find(x => x.id === id && new Date(x.expireAt).getTime() > Date.now());
    if (!s) {
      document.body.innerHTML = "<div style='padding:20px;'>分享链接无效或已过期</div>";
      return true;
    }
    const ledger = JSON.parse(s.ledgerSnapshot);
    const pathFor = (rid) => {
      const arr = [];
      let c = ledger.regions.find(r => r.id === rid);
      while (c) {
        arr.unshift(c.name);
        if (c.parentId === null) break;
        c = ledger.regions.find(r => r.id === c.parentId);
      }
      return arr.join(" > ");
    };
    document.body.innerHTML = `
      <div style="max-width:860px;margin:0 auto;padding:16px;">
        <h2>${s.ledgerName}（只读分享）</h2>
        ${ledger.regions.map(r => {
          const list = ledger.items.filter(i => i.regionId === r.id);
          return `<div style="background:#fff;padding:10px;border-radius:8px;margin-bottom:8px;"><strong>${pathFor(r.id) || "未分类"}</strong><ul>${list.map(i => `<li>${i.name} x ${i.quantity}</li>`).join("") || "<li>无</li>"}</ul></div>`;
        }).join("")}
      </div>
    `;
    return true;
  }

        openSimpleModal("重命名区域", ({ name }) => {

      if (act === "switchLedger") {
        state.data.currentLedgerId = id;
        saveData();
        closeModal();
        renderAll();

      if (act === "pickVoiceRegion") {
        // 该动作在语音多匹配弹窗中由专用监听处理

    });
    el.regionTree.addEventListener("dragover", (e) => { if (e.target.closest("[data-rid]")) e.preventDefault(); });
    el.regionTree.addEventListener("drop", (e) => {
      e.preventDefault();
      if (!isEditable()) return;
      const t = e.target.closest("[data-rid]");
      if (!t || !dragId) return;
      if (t.dataset.rid === dragId) return;
      if (descendants(dragId).includes(t.dataset.rid)) return;
      const m = regionById(dragId);
      if (!m) return;
      m.parentId = t.dataset.rid;
      saveData();
      renderRegionTree();
      dragId = "";
    });
  }

      return arr.join(" > ");
    };
    document.body.innerHTML = `<div style="max-width:860px;margin:0 auto;padding:16px;"><h2>${s.ledgerName}（只读）</h2>${ledger.regions.map(r => `<div style="background:#fff;border-radius:8px;padding:10px;margin-bottom:8px;"><strong>${getPath(r.id) || "未分类"}</strong><ul>${ledger.items.filter(i => i.regionId === r.id).map(i => `<li>${i.name} x ${i.quantity}</li>`).join("") || "<li>无</li>"}</ul></div>`).join("")}</div>`;
    return true;
  }

  function init() {
    loadData();
    if (initShareMode()) return;
    cleanTrash();
    monthlyBackupReminder();
    bindEvents();
    renderAll();
    initVoiceFallback();
    initReminderLoop();
    initGuide();
  }
  init();
  </script>
</body>
</html>
